<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – Craftivio AI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-card">
    <a href="../index.html" class="auth-back">← Back to home</a>
    <div class="auth-logo">Craftivio<span class="logo-dot">.</span></div>
    <p class="auth-tagline">Welcome back. Let's create something viral.</p>

    <div class="auth-error" id="authError"></div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary auth-submit" id="loginBtn">Log In</button>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>
    <p class="auth-footer" style="margin-top:8px; font-size:0.78rem; color: var(--text-dim);">
      Demo: use any email + password to log in
    </p>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // Redirect if already logged in
    if (CraftivioAI.getCurrentUser()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('authError');

      errorEl.classList.remove('show');

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('show');
        return;
      }

      const users = CraftivioAI.getUsers();
      const user = users[email];

      if (!user) {
        errorEl.textContent = 'No account found. Please sign up first.';
        errorEl.classList.add('show');
        return;
      }

      if (user.password !== password) {
        errorEl.textContent = 'Incorrect password. Please try again.';
        errorEl.classList.add('show');
        return;
      }

      CraftivioAI.setCurrentUser(user);
      window.location.href = 'dashboard.html';
    });

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
